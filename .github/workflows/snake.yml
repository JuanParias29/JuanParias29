name: Generate Snake Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate white snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: JuanParias29
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=ffffff
            dist/github-contribution-grid-snake-white.svg?color_snake=ffffff&color_dots=#ebedf0,#c6e6ff,#7fbfff,#3399ff,#0066cc

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
